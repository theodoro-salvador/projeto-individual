<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum</title>

    <link rel="icon" href="../../src/img/icons/icon.png">

    <script src="../../src/js/script.js"></script>

    <link rel="stylesheet" href="../../src/css/global-style.css">
    <link rel="stylesheet" href="../../src/css/forum-style.css">
</head>
<body>
    <div class="left-menu">
        <div class="left-menu-content">
            <div id="login_form" class="form">
                <div class="form-content">
                    <div class="form-title">
                        <span>Login</span>
                    </div>

                    <div class="inputs-section">
                        <div class="input">
                            <label for="login_email">E-mail: </label>
                            <input type="text" id="login_email">
                        </div>

                        <div class="input">
                            <label for="login_password">Senha: </label>
                            <input type="text" id="login_password">
                        </div>
                    </div>

                    <div class="submit">
                        <button id="login_button" class="submit-button">Entrar</button>

                        <span>
                            Não tem uma conta? 
                            <span onclick="alterLoginRegis()">Registre-se</span>!
                        </span>
                    </div>
                </div>
            </div>

            <div id="register_form" class="form">
                <div class="form-content">
                    <div class="form-title">
                        <span>Registro</span>
                    </div>

                    <div class="inputs-section">
                        <div class="input">
                            <label for="username">Nome de Usuário: </label>
                            <input type="text" id="username">
                        </div>

                        <div class="input">
                            <label for="register_email">E-mail: </label>
                            <input type="text" id="register_email">
                        </div>

                        <div class="input">
                            <label for="register_password">Senha: </label>
                            <input type="text" id="register_password">
                        </div>
                    </div>

                    <div class="submit">
                            <button id="register_button" class="submit-button">Registrar</button>

                            <span>
                                Já tem uma conta? 
                                <span onclick="alterLoginRegis()">Entre</span>!
                            </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <header>
        <div class="header-content">
            
        </div>
    </header>

    <main>
        <div class="main-content">

        </div>
    </main>
</body>
</html>
